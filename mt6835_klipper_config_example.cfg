# Example Klipper configuration for MT6835 magnetic encoder
# This configuration assumes the MT6835 is connected via SPI
# Adjust pin numbers and bus according to your hardware setup

# SPI Angle Sensor Configuration
[spi_angle mt6835_encoder]
spi_bus: spi1  # SPI bus (e.g., spi1 for Raspberry Pi SPI1)
cs_pin: gpio9  # Chip select pin (adjust based on your wiring)
spi_angle_type: mt6835  # Specify MT6835 encoder type

# Example usage with a stepper motor (e.g., for closed-loop control)
[stepper_x]
step_pin: gpio14
dir_pin: gpio15
enable_pin: gpio18
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2130_stepper_x:virtual_endstop
homing_retract_dist: 0
# Use the MT6835 encoder for angle feedback
spi_angle: mt6835_encoder

# TMC driver configuration (if using TMC2130 with encoder)
[tmc2130 stepper_x]
cs_pin: gpio8
spi_bus: spi1
diag1_pin: ^gpio24
run_current: 0.8
hold_current: 0.5
stealthchop_threshold: 0
# Encoder configuration
spi_angle: mt6835_encoder
chain_count: 64  # Encoder pulses per revolution (adjust based on your setup)

# Additional notes:
# - Ensure SPI is enabled in your Raspberry Pi configuration
# - Verify pin connections: MOSI, MISO, SCLK, CS
# - The MT6835 provides 21-bit resolution (2^21 = 2097152 counts per revolution)
# - Klipper will use 14-bit resolution internally (16384 counts per revolution)
# - Monitor for SPI timing and CRC errors in Klipper logs